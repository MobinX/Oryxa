name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests (PGlite)
        env:
          INTERNAL_KEY: test-internal-key
          META_VERIFY_TOKEN: test-token
          NODE_ENV: test
        run: bun run test

      - name: Build web
        run: bun --filter web build

  neon:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && vars.NEON_DATABASE_URL != ''

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Run optional Neon integration tests
        env:
          NEON_DATABASE_URL: ${{ vars.NEON_DATABASE_URL }}
        run: bun run test:neon
