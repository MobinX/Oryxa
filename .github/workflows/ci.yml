name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: oryxa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Push database schema
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/oryxa_test
        run: bun run db:push

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/oryxa_test
          INTERNAL_KEY: test-internal-key
          META_VERIFY_TOKEN: test-token
        run: bun test

      - name: Build web
        run: bun --filter web build
